name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high+ severity)
        run: npm audit --audit-level=high
        continue-on-error: true # Don't fail build, just inform
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npx vitest run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run Playwright tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-32-characters-min
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key-32-chars-min
          ANTHROPIC_API_KEY: sk-ant-placeholder
          GEMINI_API_KEY: placeholder-gemini-key
          CRON_SECRET: placeholder-cron-secret
          RESEND_API_KEY: re_placeholder
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  performance:
    name: Lighthouse & Bundle Size
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-32-characters-min
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key-32-chars-min
          ANTHROPIC_API_KEY: sk-ant-placeholder
          GEMINI_API_KEY: placeholder-gemini-key
          CRON_SECRET: placeholder-cron-secret
          RESEND_API_KEY: re_placeholder
      - name: Check bundle size
        run: npm run check-bundle
      - name: Audit build secrets
        run: npm run audit-secrets
      - name: Run Lighthouse CI
        run: npx lhci autorun
        continue-on-error: true # Don't fail on lighthouse issues yet, just inform
      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse
          path: .lighthouseci/
          retention-days: 14

  content:
    name: Content Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate MDX frontmatter
        run: npm run validate-content
