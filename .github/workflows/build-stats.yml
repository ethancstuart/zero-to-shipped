name: Build Stats
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Count stats
        run: |
          echo "{" > build-stats.json
          echo "  \"loc\": $(find src -name '*.ts' -o -name '*.tsx' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')," >> build-stats.json
          echo "  \"files\": $(find src -name '*.ts' -o -name '*.tsx' | wc -l | tr -d ' ')," >> build-stats.json
          echo "  \"contentFiles\": $(find content -name '*.mdx' 2>/dev/null | wc -l | tr -d ' ')," >> build-stats.json
          echo "  \"tests\": $(grep -r 'it(' src --include='*.test.*' 2>/dev/null | wc -l | tr -d ' ')," >> build-stats.json
          echo "  \"routes\": $(find src/app -name 'page.tsx' 2>/dev/null | wc -l | tr -d ' ')," >> build-stats.json
          echo "  \"commits\": $(git rev-list --count HEAD)," >> build-stats.json
          echo "  \"generatedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" >> build-stats.json
          echo "}" >> build-stats.json
          cat build-stats.json
      - name: Commit stats
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add build-stats.json
          git diff --staged --quiet || git commit -m "chore: update build stats"
          git push
